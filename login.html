<!DOCTYPE html><html><head><title>Login</title><link rel="stylesheet" href="style.css"></head><body><div class="app center"><h1>COLOR <span>RUSH 30</span></h1><div class="card"><h2>Login</h2><input id="nic" placeholder="NIC number"><input id="password" type="password" placeholder="Password"><button class="btn" onclick="login()">Login</button><p>No account? <a class="link" href="register.html">Register</a></p></div></div><script>
async function login(){const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nic:nic.value,password:password.value})});const d=await r.json();if(!r.ok)return alert(d.message);localStorage.setItem('user',JSON.stringify(d.user));location.href='user.html'}
</script></body></html>
