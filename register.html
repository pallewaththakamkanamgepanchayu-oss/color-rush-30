<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
<div class="app">
  <h1 class="center">REGISTER <span>ACCOUNT</span></h1>

  <div class="card">
    <input id="name" placeholder="Full name">

    <label>Birthday</label>
    <input id="birthday" type="date">

    <input id="nic" placeholder="NIC number">
    <input id="password" type="password" placeholder="Password">
    <input id="ref" placeholder="Referral code (optional)">

    <label>NIC Photo</label>
    <input id="photo" type="file" accept="image/*">

    <button class="btn" onclick="reg()">Submit Register</button>

    <p class="center">
      <a class="link" href="login.html">Back to login</a>
    </p>
  </div>
</div>

<script>
const API_BASE = "https://color-rush-30-production.up.railway.app";

async function reg() {
  if (!name.value || !nic.value || !password.value) {
    alert("Please fill name, NIC and password");
    return;
  }

  let f = new FormData();
  f.append("name", name.value);
  f.append("birthday", birthday.value);
  f.append("nic", nic.value);
  f.append("password", password.value);
  f.append("referred_by", ref.value);

  if (photo.files[0]) {
    f.append("nic_photo", photo.files[0]);
  }

  const r = await fetch(API_BASE + "/api/register", {
    method: "POST",
    body: f
  });

  const d = await r.json();

  alert(d.message + (d.referral_code ? " Your code: " + d.referral_code : ""));

  if (r.ok) {
    location.href = "login.html";
  }
}
</script>
</body>
</html>
