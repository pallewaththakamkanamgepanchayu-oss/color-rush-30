<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
<div class="app">
  <h1 class="center">REGISTER <span>ACCOUNT</span></h1>

  <div class="card">
    <input id="name" placeholder="Full name">

    <label>Birthday</label>
    <input id="birthday" type="date">

    <input id="nic" placeholder="NIC number">
    <input id="password" type="password" placeholder="Password">
    <input id="ref" placeholder="Referral code (optional)">

    <label>NIC Photo</label>
    <input id="photo" type="file" accept="image/*">

    <button class="btn" onclick="reg()">Submit Register</button>

    <p class="center">
      <a class="link" href="login.html">Back to login</a>
    </p>
  </div>
</div>

<script>
const API_BASE = "https://color-rush-30-production.up.railway.app";

async function reg() {
  const nameInput = document.getElementById("name").value.trim();
  const birthdayInput = document.getElementById("birthday").value;
  const nicInput = document.getElementById("nic").value.trim();
  const passwordInput = document.getElementById("password").value.trim();
  const refInput = document.getElementById("ref").value.trim();
  const photoInput = document.getElementById("photo");

  if (!nameInput || !nicInput || !passwordInput) {
    alert("Please fill name, NIC and password");
    return;
  }

  let f = new FormData();
  f.append("name", nameInput);
  f.append("birthday", birthdayInput);
  f.append("nic", nicInput);
  f.append("password", passwordInput);
  f.append("referred_by", refInput);

  if (photoInput.files[0]) {
    f.append("nic_photo", photoInput.files[0]);
  }

  try {
    const r = await fetch(API_BASE + "/api/register", {
      method: "POST",
      body: f
    });

    const d = await r.json();

    alert(d.message + (d.referral_code ? " Your code: " + d.referral_code : ""));

    if (r.ok) {
      location.href = "login.html";
    }
  } catch (err) {
    alert("Register failed");
    console.log(err);
  }
}
</script>
</body>
</html>
